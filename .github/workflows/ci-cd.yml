name: ML Platform CI/CD Pipeline

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:  # 允许手动触发

jobs:
  # ==================== 1. 代码检查 ====================
  lint:
    name: Code Lint & Type Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/ml-platform/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: ./frontend/ml-platform

      - name: Run ESLint
        run: npm run lint
        working-directory: ./frontend/ml-platform

      - name: Run TypeScript type check
        run: npm run typecheck
        working-directory: ./frontend/ml-platform

  # ==================== 2. 后端代码检查 ====================
  backend-lint:
    name: Python Backend Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Ruff linter
        run: pip install ruff && ruff check src/

      - name: Run mypy type check
        run: pip install mypy && mypy src/

  # ==================== 3. 单元测试 ====================
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [lint, backend-lint]  # 等待 lint 完成
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci
        working-directory: ./frontend/ml-platform

      - name: Run frontend tests
        run: npm run test:run -- --coverage
        working-directory: ./frontend/ml-platform

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run backend tests
        run: |
          pip install pytest pytest-cov
          pytest src/ --cov=src --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  # ==================== 4. 构建 ====================
  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: test  # 等待测试完成
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/ml-platform/package-lock.json

      - name: Install and build frontend
        run: |
          npm ci
          npm run build
        working-directory: ./frontend/ml-platform

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: frontend/ml-platform/dist
          retention-days: 7

  # ==================== 5. 部署预览 (PR) ====================
  preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: build
    # 只在 PR 时部署预览
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Vercel Preview
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          github-comment: true
          vercel-args: '--prod=false'

  # ==================== 6. 生产部署 (仅 master/main) ====================
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    # 只在推送到 master/main 时部署
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    
    environment:
      name: production
      url: https://your-app.vercel.app
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Vercel Production
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod=true'

# ==================== Docker Compose 配置 ====================
# 使用方式: docker-compose up -d

services:
  # -------------------- 前端服务 --------------------
  frontend:
    build:
      context: ./frontend/ml-platform
      dockerfile: Dockerfile
    container_name: ml-platform-frontend
    ports:
      - "3000:80"  # 映射到 Nginx 80 端口
    restart: unless-stopped
    networks:
      - ml-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  # -------------------- 后端服务 --------------------
  backend:
    build:
      context: ./src
      dockerfile: Dockerfile
    container_name: ml-platform-backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - ENV_MODE=prod
    volumes:
      # 挂载数据目录（开发模式可注释掉）
      # - ./data:/app/data:ro
      # - ./output:/app/output
    restart: unless-stopped
    networks:
      - ml-network
    depends_on:
      - frontend  # 前端启动后再启动后端（可选）
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

# ==================== 网络配置 ====================
networks:
  ml-network:
    driver: bridge
